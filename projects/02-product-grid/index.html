<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表-网格布局</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>热门商品推荐</h1>
    <div class="product-grid">
        <div class="card">
            <img src="images/经典双肩包.webp" alt="商品图片">
            <h3>经典双肩包</h3>
            <p class="prince">$199.00</p>
            <button>查看详情</button>
        </div>
        <div class="card">
            <img src="images/运动耳机.webp" alt="商品图片">
            <h3>运动耳机</h3>
            <p class="prince">$299.00</p>
            <button>查看详情</button>
        </div>
        <div class="card">
            <img src="images/智能手表.png" alt="商品图片">
            <h3>智能手表</h3>
            <p class="prince">$899.00</p>
            <button>查看详情</button>
        </div>
        <div class="card">
            <img src="images/无线鼠标.jpg" alt="商品图片">
            <h3>无线鼠标</h3>
            <p class="price">¥79.00</p>
            <button>查看详情</button>
        </div>
        <div class="card">
            <img src="images/机械键盘.jpg" alt="商品图片">
            <h3>机械键盘</h3>
            <p class="price">¥399.00</p>
            <button>查看详情</button>
        </div>
        <div class="card">
            <img src="images/移动电源.webp" alt="商品图片">
            <h3>移动电源</h3>
            <p class="price">¥129.00</p>
            <button>查看详情</button>
        </div>
    </div>
</body>
</html>
