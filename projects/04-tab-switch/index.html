<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab切换效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 500px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .tab-buttons {
            display: flex;
            border-bottom: 1px solid #ddd;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            color: #666;
        }
        .tab-btn:hover {
            background: #f0f0f0;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            background: white;
        }
        .tab-contents {
            padding: 20px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        h3 {
            margin-bottom: 10px;
            color: #333;
        }
        p, ul {
            color: #666;
            line-height: 1.6;
        }
        ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tab 按钮容器 -->
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="tab1">商品介绍</button>
            <button class="tab-btn" data-tab="tab2">规格参数</button>
            <button class="tab-btn" data-tab="tab3">用户评论</button>
        </div>
        <!-- Tab 内容容器 -->
        <div class="tab-contents">
            <div class="tab-content active" id="tab1">
                <h3>商品介绍</h3>
                <p>这是一款高性能智能手机，配备6.7英寸超视网膜屏幕，A15仿生芯片，支持5G网络。</p>
            </div>
            <div class="tab-content" id="tab2">
                <h3>规格参数</h3>
                <ul>
                    <li>处理器：A15仿生芯片</li>
                    <li>内存：8GB</li>
                    <li>屏幕：6.7英寸</li>
                </ul>
            </div>
            <div class="tab-content" id="tab3">
                <h3>用户评论</h3>
                <p>⭐⭐⭐⭐⭐ 非常好用，系统流畅！</p>
                <p>⭐⭐⭐⭐ 电池续航不错，拍照清晰。</p>
            </div>
        </div>
    </div>
    <script>
        // 获取所有标签按钮和内容
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        // 为每个标签按钮添加点击事件监听器
        tabButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有按钮的 active 类
                tabButtons.forEach(b => b.classList.remove('active'));
                // 为当前点击的按钮添加 active 类
                this.classList.add('active');

                // 获取当前按钮关联的 tab 内容 ID（通过 data-tab 属性）
                const tabId = this.getAttribute('data-tab');
                // 隐藏所有 tab 内容
                tabContents.forEach(content => content.classList.remove('active'));
                // 显示选中的 tab 内容
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
</body>
</html>
