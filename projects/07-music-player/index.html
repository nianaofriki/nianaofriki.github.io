<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player-card {
            background: white;
            width: 350px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* 专辑封面 */
        .cover {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        /* 播放时封面旋转 */
        .cover.playing {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 歌曲信息 */
        .song-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .artist {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* 进度条 */
        .progress-bar {
            background: #eee;
            height: 4px;
            border-radius: 2px;
            margin: 20px 0;
            cursor: pointer;
            position: relative;
        }

        .progress {
            background: #667eea;
            height: 100%;
            width: 0%;
            border-radius: 2px;
            position: relative;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .controls button {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #667eea;
            transition: transform 0.2s;
        }

        .controls button:hover {
            transform: scale(1.1);
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .volume-control input {
            flex: 1;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <!-- 专辑封面 -->
        <div class="cover" id="cover">🎵</div>

        <!-- 歌曲信息 -->
        <div class="song-title" id="songTitle">起风了</div>
        <div class="artist" id="artist">买辣椒也用券</div>

        <!-- 进度条 -->
        <div class="progress-bar" id="progressBar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button id="prevBtn">⏮</button>
            <button id="playBtn">▶</button>
            <button id="nextBtn">⏭</button>
        </div>

        <!-- 音量控制 -->
        <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volume" min="0" max="100" value="70">
        </div>
    </div>

    <script>
        // ========== 歌曲列表 ==========
        const playlist = [
            { title: "起风了", artist: "买辣椒也用券", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { title: "夜空中最亮的星", artist: "逃跑计划", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { title: "平凡之路", artist: "朴树", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];

        // ========== DOM 元素 ==========
        const cover = document.getElementById('cover');
        const songTitle = document.getElementById('songTitle');
        const artist = document.getElementById('artist');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume');

        // ========== 变量 ==========
        let currentIndex = 0;          // 当前播放第几首
        let isPlaying = false;          // 是否正在播放
        let audio = new Audio();        // 音频对象

        // ========== 加载歌曲 ==========
        function loadSong(index) {
            const song = playlist[index];
            songTitle.textContent = song.title;
            artist.textContent = song.artist;
            audio.src = song.url;
            
            // 随机封面颜色
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeead', '#ffcc5c'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            cover.style.background = `linear-gradient(135deg, ${randomColor}, ${randomColor}dd)`;
            
            // 重置进度条
            progress.style.width = '0%';
            currentTimeSpan.textContent = '0:00';
            
            // 加载完成后自动播放（如果是切换歌曲）
            if (isPlaying) {
                audio.play();
            }
        }

        // ========== 播放 ==========
        function playSong() {
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸';
            cover.classList.add('playing');
        }

        // ========== 暂停 ==========
        function pauseSong() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
            cover.classList.remove('playing');
        }

        // ========== 切换播放/暂停 ==========
        function togglePlay() {
            if (isPlaying) {
                pauseSong();
            } else {
                playSong();
            }
        }

        // ========== 上一首 ==========
        function prevSong() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        // ========== 下一首 ==========
        function nextSong() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        // ========== 更新时间显示 ==========
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' + secs : secs}`;
        }

        // ========== 更新进度条 ==========
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${percent}%`;
                currentTimeSpan.textContent = formatTime(audio.currentTime);
                durationSpan.textContent = formatTime(audio.duration);
            }
        }

        // ========== 点击进度条跳转 ==========
        function setProgress(e) {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percent = clickX / width;
            audio.currentTime = percent * audio.duration;
        }

        // ========== 设置音量 ==========
        function setVolume() {
            audio.volume = volumeSlider.value / 100;
        }

        // ========== 自动播放下一首 ==========
        function onSongEnd() {
            nextSong();
        }

        // ========== 绑定事件 ==========
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        progressBar.addEventListener('click', setProgress);
        volumeSlider.addEventListener('input', setVolume);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', onSongEnd);
        audio.addEventListener('loadedmetadata', function() {
            durationSpan.textContent = formatTime(audio.duration);
        });

        // ========== 初始化 ==========
        loadSong(0);
    </script>
</body>
</html>
