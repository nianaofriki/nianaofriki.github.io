<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商悬浮框 · 商品卡片悬停效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* 商品网格容器 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        /* 商品卡片 */
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* ========== 悬停效果 ========== */
        .product-card:hover {
            transform: translateY(-10px);      /* 向上移动10px */
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2);  /* 阴影变大 */
        }

        /* 图片容器 */
        .card-img {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
        }

        /* 图片 */
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* 悬停时图片放大 */
        .product-card:hover .card-img img {
            transform: scale(1.1);
        }

        /* 商品信息 */
        .card-info {
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .original-price {
            font-size: 14px;
            color: #ccc;
            text-decoration: line-through;
            margin-left: 10px;
        }

        /* 购买按钮 */
        .buy-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        /* 悬停时按钮变色 */
        .product-card:hover .buy-btn {
            background: #764ba2;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="product-grid">
        <!-- 商品1 -->
        <div class="product-card">
            <div class="card-img">
                🎧
            </div>
            <div class="card-info">
                <div class="card-title">无线降噪耳机</div>
                <div class="card-desc">主动降噪，30小时续航</div>
                <div class="price">
                    ¥299
                    <span class="original-price">¥599</span>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品2 -->
        <div class="product-card">
            <div class="card-img">
                ⌚
            </div>
            <div class="card-info">
                <div class="card-title">智能手表</div>
                <div class="card-desc">血氧监测，14天续航</div>
                <div class="price">
                    ¥899
                    <span class="original-price">¥1299</span>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品3 -->
        <div class="product-card">
            <div class="card-img">
                📷
            </div>
            <div class="card-info">
                <div class="card-title">运动相机</div>
                <div class="card-desc">4K高清，防水防抖</div>
                <div class="price">
                    ¥1599
                    <span class="original-price">¥2299</span>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品4 -->
        <div class="product-card">
            <div class="card-img">
                💻
            </div>
            <div class="card-info">
                <div class="card-title">机械键盘</div>
                <div class="card-desc">RGB背光，青轴手感</div>
                <div class="price">
                    ¥399
                    <span class="original-price">¥599</span>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品5 -->
        <div class="product-card">
            <div class="card-img">
                🖱️
            </div>
            <div class="card-info">
                <div class="card-title">无线鼠标</div>
                <div class="card-desc">人体工学，静音按键</div>
                <div class="price">
                    ¥79
                    <span class="original-price">¥129</span>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>

        <!-- 商品6 -->
        <div class="product-card">
            <div class="card-img">
                🔋
            </div>
            <div class="card-info">
                <div class="card-title">移动电源</div>
                <div class="card-desc">20000mAh，快充协议</div>
                <div class="price">
                    ¥129
                    <span class="original-price">¥199</span>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>
    </div>

    <script>
        // 获取所有购买按钮
        const buyBtns = document.querySelectorAll('.buy-btn');

        // 为每个按钮添加点击事件
        buyBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();  // 阻止事件冒泡
                const card = this.closest('.product-card');
                const title = card.querySelector('.card-title').textContent;
                alert(`已添加 ${title} 到购物车！`);
            });
        });
    </script>
</body>
</html>
